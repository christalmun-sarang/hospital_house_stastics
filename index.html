
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 20px; font-family: var(--font-sans); display: flex; flex-direction: column; gap: 12px; }
h3 { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
.row { display: flex; gap: 8px; }
button { padding: 8px 14px; background: #534AB7; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
.log { font-size: 12px; background: var(--color-background-secondary); border-radius: 8px; padding: 10px; min-height: 120px; color: var(--color-text-primary); white-space: pre-wrap; border: 0.5px solid var(--color-border-tertiary); }
input { flex: 1; font-size: 13px; padding: 8px 11px; border-radius: 8px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
</style>
<div class="wrap">
  <h3>🔧 Storage 진단 도구</h3>
  <div class="row">
    <input id="txt" placeholder="테스트 메시지 입력" value="안녕하세요 테스트" />
  </div>
  <div class="row">
    <button onclick="doWrite()">① 쓰기 (shared)</button>
    <button onclick="doRead()">② 읽기 (shared)</button>
    <button onclick="doList()">③ 키 목록</button>
    <button onclick="clearLog()">로그 지우기</button>
  </div>
  <div class="log" id="log">버튼을 눌러 테스트하세요...</div>
</div>
<script>
function log(msg){ const el=document.getElementById('log'); el.textContent+='\n'+msg; }
function clearLog(){ document.getElementById('log').textContent=''; }

async function doWrite(){
  const txt=document.getElementById('txt').value||'test';
  try{
    const r=await window.storage.set('diag_test', JSON.stringify({msg:txt,ts:Date.now()}), true);
    log('✅ 쓰기 성공: '+JSON.stringify(r));
  }catch(e){ log('❌ 쓰기 실패: '+e); }
}
async function doRead(){
  try{
    const r=await window.storage.get('diag_test', true);
    if(r) log('✅ 읽기 성공: '+r.value);
    else log('⚠️ 키 없음 (null 반환)');
  }catch(e){ log('❌ 읽기 실패 (에러): '+e); }
}
async function doList(){
  try{
    const r=await window.storage.list('', true);
    log('✅ 키 목록: '+JSON.stringify(r));
  }catch(e){ log('❌ 목록 실패: '+e); }
}
</script>
