
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { display: flex; height: 520px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
.sidebar { width: 200px; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; background: var(--color-background-secondary); }
.sidebar-header { padding: 14px 12px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.my-info { display: flex; align-items: center; gap: 8px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.av-purple { background: #EEEDFE; color: #3C3489; }
.av-teal { background: #E1F5EE; color: #085041; }
.av-coral { background: #FAECE7; color: #712B13; }
.av-blue { background: #E6F1FB; color: #0C447C; }
.av-amber { background: #FAEEDA; color: #633806; }
.av-pink { background: #FBEAF0; color: #72243E; }
.my-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.my-affil { font-size: 11px; color: var(--color-text-secondary); }
.user-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.user-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; position: relative; }
.user-item:hover { background: var(--color-background-primary); }
.user-item.active { background: var(--color-background-primary); }
.user-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: #534AB7; border-radius: 0 2px 2px 0; }
.user-meta { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.user-affil { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge { background: #534AB7; color: #fff; border-radius: 10px; font-size: 10px; padding: 1px 6px; min-width: 16px; text-align: center; }
.chat-area { flex: 1; display: flex; flex-direction: column; }
.chat-header { padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 10px; }
.chat-header-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.chat-header-affil { font-size: 12px; color: var(--color-text-secondary); }
.messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.msg-row { display: flex; align-items: flex-end; gap: 6px; }
.msg-row.mine { flex-direction: row-reverse; }
.bubble { max-width: 70%; padding: 8px 12px; border-radius: 16px; font-size: 13px; line-height: 1.5; }
.bubble.theirs { background: var(--color-background-secondary); color: var(--color-text-primary); border-bottom-left-radius: 4px; }
.bubble.mine { background: #534AB7; color: #fff; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: var(--color-text-tertiary); margin-bottom: 2px; }
.msg-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 0.5px solid var(--color-border-tertiary); }
.msg-input-row input { flex: 1; font-size: 13px; padding: 8px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.msg-input-row input:focus { border-color: #534AB7; }
.send-btn { width: 34px; height: 34px; border-radius: 50%; background: #534AB7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send-btn i { color: #fff; font-size: 16px; }
.send-btn:disabled { opacity: 0.4; cursor: default; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--color-text-tertiary); gap: 8px; }
.empty-state i { font-size: 36px; }
.empty-state p { font-size: 13px; }
.onboard { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 520px; gap: 16px; padding: 24px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); }
.onboard h2 { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
.onboard p { font-size: 13px; color: var(--color-text-secondary); text-align: center; }
.onboard input { width: 100%; max-width: 280px; font-size: 14px; padding: 10px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.onboard input:focus { border-color: #534AB7; }
.onboard button { width: 100%; max-width: 280px; padding: 10px; background: #534AB7; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; }
.day-divider { text-align: center; font-size: 11px; color: var(--color-text-tertiary); margin: 4px 0; position: relative; }
.day-divider::before, .day-divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 0.5px; background: var(--color-border-tertiary); }
.day-divider::before { left: 0; }
.day-divider::after { right: 0; }
</style>

<div id="root"></div>

<script>
const COLORS = ['av-purple','av-teal','av-coral','av-blue','av-amber','av-pink'];
const STORAGE_KEY = 'clinic_chat_v2';
const MY_KEY = 'clinic_my_id';

function getInitials(name) {
  return name.split('').slice(0,2).join('').toUpperCase();
}
function colorFor(id) {
  let h = 0; for (let c of id) h = (h*31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}
function timeStr(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
}
function dateStr(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
}
function msgKey(a, b) {
  return [a,b].sort().join('__');
}

async function loadState() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    return r ? JSON.parse(r.value) : { users: {}, messages: {} };
  } catch { return { users: {}, messages: {} }; }
}
async function saveState(state) {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(state), true); } catch {}
}
async function loadMyId() {
  try {
    const r = await window.storage.get(MY_KEY, false);
    return r ? r.value : null;
  } catch { return null; }
}
async function saveMyId(id) {
  try { await window.storage.set(MY_KEY, id, false); } catch {}
}

let state = { users: {}, messages: {} };
let myId = null;
let activeUser = null;
let pollTimer = null;

async function init() {
  state = await loadState();
  myId = await loadMyId();
  if (!myId || !state.users[myId]) {
    renderOnboard();
  } else {
    renderApp();
    startPoll();
  }
}

function renderOnboard() {
  document.getElementById('root').innerHTML = `
    <div class="onboard">
      <div class="avatar av-purple" style="width:52px;height:52px;font-size:18px;"><i class="ti ti-message-circle" aria-hidden="true"></i></div>
      <h2>한강의원 메신저</h2>
      <p>처음 접속 시 소속과 이름을 입력하세요.<br>이후에는 자동으로 로그인됩니다.</p>
      <input id="ob-name" type="text" placeholder="이름 (예: 김철수)" maxlength="10" />
      <input id="ob-affil" type="text" placeholder="소속 (예: 간호사, 원무팀)" maxlength="15" />
      <button onclick="doRegister()">시작하기</button>
    </div>`;
  document.getElementById('ob-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('ob-affil').focus(); });
  document.getElementById('ob-affil').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
}

async function doRegister() {
  const name = document.getElementById('ob-name').value.trim();
  const affil = document.getElementById('ob-affil').value.trim();
  if (!name || !affil) return;
  myId = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  state.users[myId] = { id: myId, name, affil, lastSeen: Date.now() };
  await saveMyId(myId);
  await saveState(state);
  renderApp();
  startPoll();
}

function getOtherUsers() {
  return Object.values(state.users).filter(u => u.id !== myId);
}
function unreadCount(uid) {
  const key = msgKey(myId, uid);
  const msgs = (state.messages[key] || []).filter(m => m.from === uid && !m.read);
  return msgs.length;
}

function renderApp() {
  const others = getOtherUsers();
  const me = state.users[myId];
  let sidebarUsers = '';
  for (const u of others) {
    const uc = unreadCount(u.id);
    const active = activeUser === u.id ? 'active' : '';
    sidebarUsers += `
      <div class="user-item ${active}" onclick="selectUser('${u.id}')">
        <div class="avatar ${colorFor(u.id)}">${getInitials(u.name)}</div>
        <div class="user-meta">
          <div class="user-name">${u.name}</div>
          <div class="user-affil">${u.affil}</div>
        </div>
        ${uc > 0 ? `<span class="badge">${uc}</span>` : ''}
      </div>`;
  }
  let chatContent = '';
  if (activeUser && state.users[activeUser]) {
    const peer = state.users[activeUser];
    const key = msgKey(myId, activeUser);
    const msgs = state.messages[key] || [];
    let msgHtml = '';
    let lastDate = '';
    for (const m of msgs) {
      const d = dateStr(m.ts);
      if (d !== lastDate) {
        msgHtml += `<div class="day-divider">${d}</div>`;
        lastDate = d;
      }
      const mine = m.from === myId;
      msgHtml += `<div class="msg-row ${mine?'mine':''}">
        ${!mine ? `<div class="avatar ${colorFor(peer.id)}" style="width:24px;height:24px;font-size:9px;">${getInitials(peer.name)}</div>` : ''}
        <div>
          <div class="msg-time" style="text-align:${mine?'right':'left'}">${timeStr(m.ts)}</div>
          <div class="bubble ${mine?'mine':'theirs'}">${m.text}</div>
        </div>
      </div>`;
    }
    if (!msgHtml) msgHtml = `<div class="empty-state"><i class="ti ti-message-dots" aria-hidden="true"></i><p>${peer.name}님과 대화를 시작하세요</p></div>`;
    chatContent = `
      <div class="chat-header">
        <div class="avatar ${colorFor(peer.id)}">${getInitials(peer.name)}</div>
        <div>
          <div class="chat-header-name">${peer.name}</div>
          <div class="chat-header-affil">${peer.affil}</div>
        </div>
      </div>
      <div class="messages" id="msg-list">${msgHtml}</div>
      <div class="msg-input-row">
        <input type="text" id="msg-input" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendMsg()" />
        <button class="send-btn" onclick="sendMsg()" aria-label="전송"><i class="ti ti-send" aria-hidden="true"></i></button>
      </div>`;
  } else {
    chatContent = `<div class="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">
      <i class="ti ti-arrow-bar-left" style="font-size:32px;" aria-hidden="true"></i>
      <p style="font-size:13px;color:var(--color-text-tertiary);">왼쪽에서 대화 상대를 선택하세요</p>
    </div>`;
  }

  document.getElementById('root').innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="my-info">
            <div class="avatar ${colorFor(myId)}">${getInitials(me.name)}</div>
            <div>
              <div class="my-name">${me.name}</div>
              <div class="my-affil">${me.affil}</div>
            </div>
          </div>
        </div>
        <div class="user-list">
          ${others.length === 0 ? `<div style="padding:16px 12px;font-size:12px;color:var(--color-text-tertiary);text-align:center;">다른 사용자가<br>아직 없습니다</div>` : sidebarUsers}
        </div>
      </div>
      <div class="chat-area" style="display:flex;flex-direction:column;">
        ${chatContent}
      </div>
    </div>`;

  const ml = document.getElementById('msg-list');
  if (ml) ml.scrollTop = ml.scrollHeight;
}

function selectUser(uid) {
  activeUser = uid;
  const key = msgKey(myId, uid);
  if (state.messages[key]) {
    state.messages[key].forEach(m => { if (m.from === uid) m.read = true; });
    saveState(state);
  }
  renderApp();
  setTimeout(() => {
    const inp = document.getElementById('msg-input');
    if (inp) inp.focus();
  }, 50);
}

async function sendMsg() {
  const inp = document.getElementById('msg-input');
  if (!inp || !activeUser) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const key = msgKey(myId, activeUser);
  if (!state.messages[key]) state.messages[key] = [];
  state.messages[key].push({ from: myId, to: activeUser, text, ts: Date.now(), read: false });
  state.users[myId].lastSeen = Date.now();
  await saveState(state);
  renderApp();
}

async function poll() {
  const fresh = await loadState();
  let changed = JSON.stringify(fresh) !== JSON.stringify(state);
  state = fresh;
  if (activeUser && state.messages[msgKey(myId, activeUser)]) {
    state.messages[msgKey(myId, activeUser)].forEach(m => { if (m.from === activeUser) m.read = true; });
  }
  if (changed) { await saveState(state); renderApp(); }
}

function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(poll, 3000);
}

init();
</script>
