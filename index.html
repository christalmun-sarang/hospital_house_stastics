
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { display: flex; height: 520px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
.sidebar { width: 200px; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; background: var(--color-background-secondary); }
.sidebar-header { padding: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.my-info { display: flex; align-items: center; gap: 8px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.av-0 { background:#EEEDFE; color:#3C3489; }
.av-1 { background:#E1F5EE; color:#085041; }
.av-2 { background:#FAECE7; color:#712B13; }
.av-3 { background:#E6F1FB; color:#0C447C; }
.av-4 { background:#FAEEDA; color:#633806; }
.av-5 { background:#FBEAF0; color:#72243E; }
.my-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.my-affil { font-size: 11px; color: var(--color-text-secondary); }
.user-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.user-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; position: relative; }
.user-item:hover { background: var(--color-background-primary); }
.user-item.active { background: var(--color-background-primary); }
.user-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:#534AB7; border-radius:0 2px 2px 0; }
.user-meta { flex:1; min-width:0; }
.user-name { font-size:13px; font-weight:500; color:var(--color-text-primary); }
.user-affil { font-size:11px; color:var(--color-text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.badge { background:#534AB7; color:#fff; border-radius:10px; font-size:10px; padding:1px 6px; min-width:16px; text-align:center; flex-shrink:0; }
.chat-area { flex:1; display:flex; flex-direction:column; min-width:0; }
.chat-header { padding:12px 16px; border-bottom:0.5px solid var(--color-border-tertiary); display:flex; align-items:center; gap:10px; }
.chat-header-name { font-size:14px; font-weight:500; color:var(--color-text-primary); }
.chat-header-affil { font-size:12px; color:var(--color-text-secondary); }
.messages { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
.msg-row { display:flex; align-items:flex-end; gap:6px; }
.msg-row.mine { flex-direction:row-reverse; }
.bubble { max-width:70%; padding:8px 12px; border-radius:16px; font-size:13px; line-height:1.5; word-break:break-word; }
.bubble.theirs { background:var(--color-background-secondary); color:var(--color-text-primary); border-bottom-left-radius:4px; }
.bubble.mine { background:#534AB7; color:#fff; border-bottom-right-radius:4px; }
.msg-time { font-size:10px; color:var(--color-text-tertiary); margin-bottom:2px; }
.msg-input-row { display:flex; gap:8px; padding:10px 12px; border-top:0.5px solid var(--color-border-tertiary); }
.msg-input-row input { flex:1; font-size:13px; padding:8px 12px; border-radius:20px; border:0.5px solid var(--color-border-tertiary); background:var(--color-background-secondary); color:var(--color-text-primary); outline:none; }
.msg-input-row input:focus { border-color:#534AB7; }
.send-btn { width:34px; height:34px; border-radius:50%; background:#534AB7; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.send-btn i { color:#fff; font-size:16px; }
.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--color-text-tertiary); gap:8px; }
.empty-chat i { font-size:32px; }
.empty-chat p { font-size:13px; }
.onboard { display:flex; flex-direction:column; align-items:center; justify-content:center; height:520px; gap:14px; padding:24px; border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); background:var(--color-background-primary); }
.onboard h2 { font-size:17px; font-weight:500; color:var(--color-text-primary); }
.onboard p { font-size:13px; color:var(--color-text-secondary); text-align:center; line-height:1.6; }
.onboard input { width:100%; max-width:280px; font-size:14px; padding:10px 14px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary); background:var(--color-background-secondary); color:var(--color-text-primary); outline:none; }
.onboard input:focus { border-color:#534AB7; }
.onboard button { width:100%; max-width:280px; padding:10px; background:#534AB7; color:#fff; border:none; border-radius:var(--border-radius-md); font-size:14px; font-weight:500; cursor:pointer; }
.day-sep { text-align:center; font-size:11px; color:var(--color-text-tertiary); padding:4px 0; }
.status-dot { width:8px; height:8px; border-radius:50%; background:#1D9E75; flex-shrink:0; }
</style>

<div id="root"></div>

<script>
const SHARED_KEY = 'hg_chat_state_v3';
const COLORS = ['av-0','av-1','av-2','av-3','av-4','av-5'];

function initials(name){ return (name||'?').slice(0,2).toUpperCase(); }
function avColor(id){ let h=0; for(let c of (id||'')) h=(h*31+c.charCodeAt(0))%6; return 'av-'+h; }
function now(){ return Date.now(); }
function timeStr(ts){ return new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function dateStr(ts){ return new Date(ts).toLocaleDateString('ko-KR',{month:'long',day:'numeric'}); }
function msgKey(a,b){ return [a,b].sort().join('||'); }

// 공유 상태: { users:{id:{id,name,affil,ts}}, msgs:{key:[{id,from,to,text,ts,readBy:[]}]} }
let S = { users:{}, msgs:{} };
// 내 ID는 localStorage (게시 아티팩트에서 유지됨)
let myId = null;
let activeUser = null;
let pollTimer = null;

async function loadShared(){
  try{
    const r = await window.storage.get(SHARED_KEY, true);
    if(r && r.value) S = JSON.parse(r.value);
  }catch(e){}
}
async function saveShared(){
  try{ await window.storage.set(SHARED_KEY, JSON.stringify(S), true); }catch(e){}
}

// localStorage로 내 ID 저장 (세션 지속)
function loadMyId(){
  try{ return localStorage.getItem('hg_myid'); }catch(e){ return null; }
}
function saveMyId(id){
  try{ localStorage.setItem('hg_myid', id); }catch(e){}
}

async function init(){
  await loadShared();
  myId = loadMyId();
  if(myId && S.users[myId]){
    // 재접속 시 lastSeen 갱신
    S.users[myId].ts = now();
    await saveShared();
    renderApp();
    startPoll();
  } else {
    myId = null;
    renderOnboard();
  }
}

function renderOnboard(){
  document.getElementById('root').innerHTML = `
    <div class="onboard">
      <div class="avatar av-0" style="width:52px;height:52px;font-size:20px;"><i class="ti ti-message-circle" aria-hidden="true"></i></div>
      <h2>한강의원 메신저</h2>
      <p>처음 접속 시 이름과 소속을 입력하세요.<br>이후 같은 기기에서는 자동 로그인됩니다.</p>
      <input id="ob-name" type="text" placeholder="이름 (예: 김철수)" maxlength="10" autocomplete="off" />
      <input id="ob-affil" type="text" placeholder="소속 (예: 간호사, 원무팀)" maxlength="15" autocomplete="off" />
      <button onclick="doRegister()">시작하기</button>
      <p style="font-size:11px;color:var(--color-text-tertiary);">같은 URL을 다른 분과 공유하면 함께 사용할 수 있습니다</p>
    </div>`;
  setTimeout(()=>{
    const n=document.getElementById('ob-name');
    const a=document.getElementById('ob-affil');
    if(n) n.addEventListener('keydown',e=>{ if(e.key==='Enter') a.focus(); });
    if(a) a.addEventListener('keydown',e=>{ if(e.key==='Enter') doRegister(); });
    if(n) n.focus();
  },50);
}

async function doRegister(){
  const name=(document.getElementById('ob-name')||{}).value||'';
  const affil=(document.getElementById('ob-affil')||{}).value||'';
  if(!name.trim()||!affil.trim()) return;
  myId='u_'+now()+'_'+Math.random().toString(36).slice(2,6);
  await loadShared(); // 최신 상태 가져온 뒤 추가
  S.users[myId]={id:myId,name:name.trim(),affil:affil.trim(),ts:now()};
  saveMyId(myId);
  await saveShared();
  renderApp();
  startPoll();
}

function getOthers(){ return Object.values(S.users).filter(u=>u.id!==myId); }

function unread(uid){
  const k=msgKey(myId,uid);
  return ((S.msgs[k])||[]).filter(m=>m.from===uid && !(m.readBy||[]).includes(myId)).length;
}

function markRead(uid){
  const k=msgKey(myId,uid);
  if(!S.msgs[k]) return false;
  let changed=false;
  S.msgs[k].forEach(m=>{ if(m.from===uid && !(m.readBy||[]).includes(myId)){ (m.readBy=m.readBy||[]).push(myId); changed=true; }});
  return changed;
}

function renderApp(){
  if(!myId||!S.users[myId]){ renderOnboard(); return; }
  const me=S.users[myId];
  const others=getOthers();

  let sideHtml='';
  if(others.length===0){
    sideHtml=`<div style="padding:16px 12px;font-size:12px;color:var(--color-text-tertiary);text-align:center;line-height:1.6;">같은 URL로 접속한<br>사용자가 없습니다</div>`;
  } else {
    for(const u of others){
      const uc=unread(u.id);
      const ac=activeUser===u.id?'active':'';
      sideHtml+=`<div class="user-item ${ac}" onclick="selectUser('${u.id}')">
        <div class="avatar ${avColor(u.id)}">${initials(u.name)}</div>
        <div class="user-meta">
          <div class="user-name">${u.name}</div>
          <div class="user-affil">${u.affil}</div>
        </div>
        ${uc>0?`<span class="badge">${uc}</span>`:''}
      </div>`;
    }
  }

  let chatHtml='';
  if(activeUser && S.users[activeUser]){
    const peer=S.users[activeUser];
    const k=msgKey(myId,activeUser);
    const msgs=S.msgs[k]||[];
    let mHtml='';
    let lastDate='';
    for(const m of msgs){
      const d=dateStr(m.ts);
      if(d!==lastDate){ mHtml+=`<div class="day-sep">${d}</div>`; lastDate=d; }
      const mine=m.from===myId;
      mHtml+=`<div class="msg-row ${mine?'mine':''}">
        ${!mine?`<div class="avatar ${avColor(peer.id)}" style="width:24px;height:24px;font-size:9px;">${initials(peer.name)}</div>`:''}
        <div>
          <div class="msg-time" style="text-align:${mine?'right':'left'}">${timeStr(m.ts)}</div>
          <div class="bubble ${mine?'mine':'theirs'}">${m.text}</div>
        </div>
      </div>`;
    }
    if(!mHtml) mHtml=`<div class="empty-chat"><i class="ti ti-message-dots" aria-hidden="true"></i><p>${peer.name}님과 대화를 시작하세요</p></div>`;
    chatHtml=`
      <div class="chat-header">
        <div class="avatar ${avColor(peer.id)}">${initials(peer.name)}</div>
        <div><div class="chat-header-name">${peer.name}</div><div class="chat-header-affil">${peer.affil}</div></div>
      </div>
      <div class="messages" id="msg-list">${mHtml}</div>
      <div class="msg-input-row">
        <input type="text" id="msg-input" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendMsg()" autocomplete="off" />
        <button class="send-btn" onclick="sendMsg()" aria-label="전송"><i class="ti ti-send" aria-hidden="true"></i></button>
      </div>`;
  } else {
    chatHtml=`<div class="empty-chat"><i class="ti ti-arrow-bar-left" aria-hidden="true"></i><p>왼쪽에서 대화 상대를 선택하세요</p></div>`;
  }

  document.getElementById('root').innerHTML=`
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="my-info">
            <div class="avatar ${avColor(myId)}">${initials(me.name)}</div>
            <div><div class="my-name">${me.name}</div><div class="my-affil">${me.affil}</div></div>
          </div>
        </div>
        <div class="user-list">${sideHtml}</div>
      </div>
      <div class="chat-area">${chatHtml}</div>
    </div>`;

  const ml=document.getElementById('msg-list');
  if(ml) ml.scrollTop=ml.scrollHeight;
}

async function selectUser(uid){
  activeUser=uid;
  markRead(uid);
  await saveShared();
  renderApp();
  setTimeout(()=>{ const i=document.getElementById('msg-input'); if(i) i.focus(); },50);
}

async function sendMsg(){
  const inp=document.getElementById('msg-input');
  if(!inp||!activeUser) return;
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  await loadShared();
  const k=msgKey(myId,activeUser);
  if(!S.msgs[k]) S.msgs[k]=[];
  S.msgs[k].push({id:'m'+now(),from:myId,to:activeUser,text,ts:now(),readBy:[myId]});
  S.users[myId].ts=now();
  await saveShared();
  renderApp();
  setTimeout(()=>{ const i=document.getElementById('msg-input'); if(i) i.focus(); },50);
}

async function poll(){
  const prev=JSON.stringify(S);
  await loadShared();
  if(activeUser){ markRead(activeUser); }
  const cur=JSON.stringify(S);
  if(prev!==cur){ await saveShared(); renderApp(); }
}

function startPoll(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(poll,3000);
}

init();
</script>
