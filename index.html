<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>사랑소아청소년과 메신저</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef0f5;display:flex;align-items:flex-start;justify-content:flex-start;min-height:100vh;}
#wrap{width:360px;height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:2px 0 12px rgba(0,0,0,0.10);transition:width 0.25s;overflow:hidden;}
#wrap.collapsed{width:0;}
#toggle-btn{position:fixed;top:0;left:360px;width:22px;height:48px;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:0 8px 8px 0;box-shadow:2px 2px 6px rgba(0,0,0,0.15);z-index:999;transition:left 0.25s;}
#toggle-btn svg{fill:#fff;width:12px;height:12px;transition:transform 0.25s;}
#wrap.collapsed~#toggle-btn{left:0;}
#wrap.collapsed~#toggle-btn svg{transform:rotate(180deg);}
#titlebar{background:#534AB7;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#titlebar .ttl{font-size:13px;font-weight:600;flex:1;}
#titlebar .sub{font-size:11px;opacity:0.75;}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;}
.login-title{font-size:15px;font-weight:700;color:#1a1a2e;}
.login-sub{font-size:11px;color:#888;text-align:center;}
.user-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.user-btn{padding:6px 12px;border-radius:16px;border:1.5px solid #e0e0e0;background:#fff;color:#333;font-size:12px;cursor:pointer;font-weight:500;}
.user-btn.sel{background:#534AB7;color:#fff;border-color:#534AB7;}
.pw-input{width:100%;font-size:13px;padding:9px 12px;border-radius:8px;border:1.5px solid #e0e0e0;outline:none;}
.pw-input:focus{border-color:#534AB7;}
.err{font-size:11px;color:#e53e3e;height:16px;text-align:center;}
.login-btn{width:100%;padding:10px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
#app{flex:1;display:flex;overflow:hidden;}
.sidebar{width:110px;border-right:1px solid #eee;display:flex;flex-direction:column;background:#fafafa;flex-shrink:0;}
.sidebar-top{padding:10px 8px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:6px;}
.me-label{font-size:11px;font-weight:600;color:#534AB7;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{font-size:10px;color:#aaa;background:none;border:none;cursor:pointer;white-space:nowrap;}
.user-list{flex:1;overflow-y:auto;padding:4px 0;}
.uitem{display:flex;align-items:center;gap:6px;padding:7px 8px;cursor:pointer;border-left:2px solid transparent;position:relative;}
.uitem:hover{background:#f0efff;}
.uitem.active{background:#f0efff;border-left-color:#534AB7;}
.u-name{font-size:12px;font-weight:500;color:#1a1a2e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge{background:#E53E3E;color:#fff;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:700;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.sm{width:22px;height:22px;font-size:9px;}
.c0{background:#EEEDFE;color:#3C3489;}.c1{background:#E1F5EE;color:#085041;}
.c2{background:#FAECE7;color:#712B13;}.c3{background:#E6F1FB;color:#0C447C;}
.c4{background:#FAEEDA;color:#633806;}
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-top{padding:9px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.chat-top-name{font-size:13px;font-weight:600;color:#1a1a2e;}
.msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
.mrow{display:flex;align-items:flex-end;gap:4px;}
.mrow.mine{flex-direction:row-reverse;}
.bubble{max-width:82%;padding:7px 10px;border-radius:14px;font-size:12px;line-height:1.5;word-break:break-word;}
.bubble.t{background:#f2f2f7;color:#1a1a2e;border-bottom-left-radius:3px;}
.bubble.m{background:#534AB7;color:#fff;border-bottom-right-radius:3px;}
.mt{font-size:9px;color:#bbb;margin-bottom:2px;}
/* 이미지 메시지 */
.msg-img{max-width:100%;max-height:160px;border-radius:10px;cursor:pointer;display:block;}
/* 파일 메시지 */
.msg-file{display:flex;align-items:center;gap:6px;padding:4px 0;}
.msg-file a{font-size:11px;color:inherit;text-decoration:underline;word-break:break-all;}
/* 업로드 진행 */
.upload-bar{height:3px;background:#534AB7;border-radius:2px;transition:width 0.2s;}
.input-row{display:flex;gap:6px;padding:8px;border-top:1px solid #eee;flex-shrink:0;align-items:center;}
.input-row input[type=text]{flex:1;font-size:12px;padding:7px 11px;border-radius:18px;border:1.5px solid #e0e0e0;outline:none;background:#fafafa;}
.input-row input[type=text]:focus{border-color:#534AB7;background:#fff;}
.sbtn{width:30px;height:30px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fbtn{width:30px;height:30px;border-radius:50%;background:#f0efff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:6px;font-size:12px;}
.dsep{text-align:center;font-size:10px;color:#bbb;padding:3px 0;}
/* 이미지 전체화면 */
#imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;cursor:pointer;}
#imgModal img{max-width:95vw;max-height:95vh;border-radius:8px;}
#imgModal.show{display:flex;}
</style>
</head>
<body>
<div id="wrap">
  <div id="titlebar">
    <span style="font-size:16px;">💬</span>
    <span class="ttl">사랑소아청소년과</span>
    <span class="sub" id="me-badge"></span>
  </div>
  <div id="main-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
</div>
<button id="toggle-btn" onclick="toggleWrap()" title="접기/펼치기">
  <svg viewBox="0 0 10 16"><path d="M8 2L2 8l6 6"/></svg>
</button>
<!-- 이미지 전체화면 모달 -->
<div id="imgModal" onclick="closeModal()">
  <img id="modalImg" src="" alt=""/>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
firebase.initializeApp({
  databaseURL:"https://notice-hanriver-default-rtdb.firebaseio.com/",
  storageBucket:"temp-share-image-hanriver.firebasestorage.app"
});
const db      = firebase.database();
const storage = firebase.storage();

const ACCOUNTS=[
  {id:'wonjang',label:'원장', pw:'ped1234',    c:'c0'},
  {id:'yakguk', label:'약국', pw:'pharma1234', c:'c1'},
  {id:'jesu1',  label:'접수1',pw:'js10000',    c:'c2'},
  {id:'jesu2',  label:'접수2',pw:'js20000',    c:'c3'},
  {id:'nam',    label:'NAM', pw:'han1234',    c:'c4'},
];

let me=null,peer=null,selId=null,unread={},chatRef=null,badgeListeners={};

function acct(id){return ACCOUNTS.find(a=>a.id===id);}
function mkey(a,b){return [a,b].sort().join('_vs_');}
function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tstr(ts){return new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function dstr(ts){return new Date(ts).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});}
function lrKey(uid){return 'lr3_'+me+'_'+uid;}
function getLR(uid){return parseInt(localStorage.getItem(lrKey(uid))||'0');}
function setLR(uid){localStorage.setItem(lrKey(uid),String(Date.now()));}
function stopChat(){if(chatRef){chatRef.off('value');chatRef=null;}}
function stopBadge(){
  for(const v of Object.values(badgeListeners)) v.ref.off('child_added',v.handler);
  badgeListeners={};
}
function toggleWrap(){document.getElementById('wrap').classList.toggle('collapsed');}
function setMeBadge(l){const el=document.getElementById('me-badge');if(el)el.textContent=l?'['+l+']':'';}
function openModal(src){document.getElementById('modalImg').src=src;document.getElementById('imgModal').classList.add('show');}
function closeModal(){document.getElementById('imgModal').classList.remove('show');}

/* ── 로그인 ── */
function showLogin(err){
  stopChat();stopBadge();setMeBadge('');
  document.getElementById('main-content').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div style="font-size:28px;">💬</div>
    <div class="login-title">메신저 로그인</div>
    <div class="login-sub">소속을 선택하고<br>비밀번호를 입력하세요</div>
    <div class="user-btns">
      ${ACCOUNTS.map(a=>`<button class="user-btn${selId===a.id?' sel':''}" onclick="pickUser('${a.id}')">${a.label}</button>`).join('')}
    </div>
    <input class="pw-input" id="pw" type="password" placeholder="비밀번호"
      autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="err">${err||''}</div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div></div>`;
  if(selId) setTimeout(()=>document.getElementById('pw')?.focus(),50);
}
function pickUser(id){
  selId=id;
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.toggle('sel',b.textContent===acct(id)?.label));
  setTimeout(()=>document.getElementById('pw')?.focus(),50);
}
function doLogin(){
  if(!selId){showLogin('소속을 선택해주세요.');return;}
  const pw=document.getElementById('pw')?.value||'';
  const a=acct(selId);
  if(!a||pw!==a.pw){showLogin('비밀번호가 맞지 않습니다.');return;}
  me=selId;localStorage.setItem('sarang_me',me);
  unread={};peer=null;setMeBadge(a.label);
  initUnreadThenRender();
}
function doLogout(){
  stopChat();stopBadge();me=null;peer=null;unread={};
  localStorage.removeItem('sarang_me');showLogin();
}

/* ── unread 초기화 ── */
function initUnreadThenRender(){
  const others=ACCOUNTS.filter(a=>a.id!==me);
  if(!others.length){renderApp();startBadgeListeners();return;}
  let done=0;
  others.forEach(u=>{
    const lr=getLR(u.id);
    db.ref('msgs/'+mkey(me,u.id)).once('value',snap=>{
      let c=0;
      snap.forEach(ch=>{const m=ch.val();if(m&&typeof m==='object'&&m.from===u.id&&m.ts>lr)c++;});
      unread[u.id]=c; done++;
      if(done===others.length){renderApp();startBadgeListeners();}
    });
  });
}

/* ── 뱃지 실시간 리스너 ── */
function startBadgeListeners(){
  stopBadge();
  const others=ACCOUNTS.filter(a=>a.id!==me);
  const startTs=Date.now();
  others.forEach(u=>{
    const ref=db.ref('msgs/'+mkey(me,u.id));
    const handler=ref.orderByChild('ts').startAt(startTs).on('child_added',snap=>{
      const m=snap.val();
      if(!m||typeof m!=='object') return;
      if(m.from===u.id && peer!==u.id){
        unread[u.id]=(unread[u.id]||0)+1;
        updateBadgeEl(u.id);
      }
      if(m.from===u.id && peer===u.id){unread[u.id]=0;updateBadgeEl(u.id);}
    });
    badgeListeners[u.id]={ref,handler};
  });
}
function updateBadgeEl(uid){
  const el=document.getElementById('bdg_'+uid);
  if(!el) return;
  const c=unread[uid]||0;
  el.innerHTML=c>0?`<span class="badge">${c}</span>`:'';
}

/* ── 앱 화면 ── */
function renderApp(){
  const myA=acct(me);
  const others=ACCOUNTS.filter(a=>a.id!==me);
  const sideHtml=others.map(u=>`
    <div class="uitem${peer===u.id?' active':''}" onclick="selectPeer('${u.id}')">
      <div class="av ${u.c}">${u.label.slice(0,2)}</div>
      <div class="u-name">${u.label}</div>
      <span id="bdg_${u.id}">${(unread[u.id]||0)>0?`<span class="badge">${unread[u.id]}</span>`:''}</span>
    </div>`).join('');

  const chatHtml=peer?`
    <div class="chat-top">
      <div class="av ${acct(peer).c}">${acct(peer).label.slice(0,2)}</div>
      <div class="chat-top-name">${acct(peer).label}</div>
    </div>
    <div class="msgs" id="msglist"></div>
    <div id="prog-wrap" style="padding:0 8px;display:none;">
      <div class="upload-bar" id="prog-bar" style="width:0%"></div>
    </div>
    <div class="input-row">
      <button class="fbtn" onclick="document.getElementById('fileInput').click()" title="파일 첨부">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" onchange="uploadFile(this)"/>
      <input type="text" id="minput" placeholder="메시지 입력..." autocomplete="off"
        onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="sbtn" onclick="sendMsg()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22 11 13 2 9 22 2Z"/></svg>
      </button>
    </div>`
  :`<div class="empty">←<span>대화 상대 선택</span></div>`;

  document.getElementById('main-content').innerHTML=`
    <div id="app">
      <div class="sidebar">
        <div class="sidebar-top">
          <div class="av ${myA.c}">${myA.label.slice(0,2)}</div>
          <div class="me-label">${myA.label}</div>
          <button class="logout-btn" onclick="doLogout()">나가기</button>
        </div>
        <div class="user-list">${sideHtml}</div>
      </div>
      <div class="chat-area">${chatHtml}</div>
    </div>`;

  if(peer){startChatListener();setTimeout(()=>document.getElementById('minput')?.focus(),100);}
}

/* ── 채팅 구독 ── */
function startChatListener(){
  stopChat();
  chatRef=db.ref('msgs/'+mkey(me,peer));
  chatRef.on('value',snap=>{
    const msgs=[];
    snap.forEach(ch=>{const m=ch.val();if(m&&typeof m==='object'&&m.from&&m.ts)msgs.push(m);});
    msgs.sort((a,b)=>a.ts-b.ts);
    renderMsgs(msgs);
    setLR(peer);unread[peer]=0;updateBadgeEl(peer);
  });
}

function renderMsgs(msgs){
  const list=document.getElementById('msglist');
  if(!list) return;
  const pA=acct(peer);
  let html='',lastD='';
  for(const m of msgs){
    const d=dstr(m.ts);
    if(d!==lastD){html+=`<div class="dsep">${d}</div>`;lastD=d;}
    const mine=m.from===me;
    let content='';
    if(m.type==='image'){
      content=`<img class="msg-img" src="${esc(m.url)}" onclick="openModal('${esc(m.url)}')" alt="이미지"/>`;
    } else if(m.type==='file'){
      content=`<div class="msg-file">📎 <a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.name)}</a></div>`;
    } else {
      content=esc(m.text||'');
    }
    html+=`<div class="mrow${mine?' mine':''}">
      ${!mine?`<div class="av sm ${pA.c}">${pA.label.slice(0,2)}</div>`:''}
      <div>
        <div class="mt" style="text-align:${mine?'right':'left'}">${tstr(m.ts)}</div>
        <div class="bubble ${mine?'m':'t'}">${content}</div>
      </div>
    </div>`;
  }
  if(!html) html=`<div class="empty">💬<span>${pA.label}과(와) 대화 시작</span></div>`;
  list.innerHTML=html;
  list.scrollTop=list.scrollHeight;
}

function selectPeer(uid){stopChat();peer=uid;unread[uid]=0;setLR(uid);renderApp();}

/* ── 텍스트 전송 ── */
function sendMsg(){
  const inp=document.getElementById('minput');
  if(!inp||!peer) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value='';
  db.ref('msgs/'+mkey(me,peer)).push({from:me,text,ts:Date.now()});
  inp.focus();
}

/* ── 파일 업로드 ── */
function uploadFile(input){
  const file=input.files[0]; if(!file||!peer) return;
  input.value='';
  const isImage=file.type.startsWith('image/');
  const path='messenger/'+mkey(me,peer)+'/'+Date.now()+'_'+file.name;
  const ref=storage.ref(path);
  const task=ref.put(file);

  // 진행바 표시
  const progWrap=document.getElementById('prog-wrap');
  const progBar=document.getElementById('prog-bar');
  if(progWrap) progWrap.style.display='block';

  task.on('state_changed',
    snap=>{
      const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);
      if(progBar) progBar.style.width=pct+'%';
    },
    err=>{
      if(progWrap) progWrap.style.display='none';
      alert('업로드 실패: '+err.message);
    },
    async ()=>{
      const url=await task.snapshot.ref.getDownloadURL();
      if(progWrap) progWrap.style.display='none';
      if(progBar) progBar.style.width='0%';
      db.ref('msgs/'+mkey(me,peer)).push({
        from:me, ts:Date.now(),
        type: isImage?'image':'file',
        url, name:file.name
      });
    }
  );
}

/* ── 초기화 ── */
const saved=localStorage.getItem('sarang_me');
if(saved&&acct(saved)){me=saved;setMeBadge(acct(saved).label);unread={};initUnreadThenRender();}
else showLogin();
</script>
</body>
</html>
