<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>사랑소아청소년과 메신저</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;height:100vh;overflow:hidden;}
.screen{height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:16px;padding:32px 28px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.10);display:flex;flex-direction:column;align-items:center;}
.login-title{font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:4px;}
.login-sub{font-size:12px;color:#888;margin-bottom:20px;text-align:center;}
.user-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
.user-btn{padding:7px 15px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;color:#333;font-size:13px;cursor:pointer;font-weight:500;}
.user-btn.sel{background:#534AB7;color:#fff;border-color:#534AB7;}
.pw-wrap{width:100%;margin-bottom:6px;}
.pw-input{width:100%;font-size:14px;padding:10px 14px;border-radius:10px;border:1.5px solid #e0e0e0;outline:none;}
.pw-input:focus{border-color:#534AB7;}
.err{font-size:12px;color:#e53e3e;height:18px;text-align:center;margin-bottom:4px;}
.login-btn{width:100%;padding:11px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.app{display:flex;height:100vh;}
.sidebar{width:200px;border-right:1px solid #eee;display:flex;flex-direction:column;background:#fafafa;flex-shrink:0;}
.sidebar-top{padding:14px 12px 10px;border-bottom:1px solid #eee;}
.me-row{display:flex;align-items:center;gap:8px;}
.me-name{font-size:13px;font-weight:600;flex:1;}
.logout-btn{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;}
.user-list{flex:1;overflow-y:auto;padding:8px 0;}
.uitem{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border-left:2.5px solid transparent;}
.uitem:hover{background:#f0efff;}
.uitem.active{background:#f0efff;border-left-color:#534AB7;}
.u-name{font-size:13px;font-weight:500;flex:1;}
.badge{background:#534AB7;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sm{width:26px;height:26px;font-size:10px;}
.c0{background:#EEEDFE;color:#3C3489;}.c1{background:#E1F5EE;color:#085041;}
.c2{background:#FAECE7;color:#712B13;}.c3{background:#E6F1FB;color:#0C447C;}
.c4{background:#FAEEDA;color:#633806;}
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-top{padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;}
.chat-top-name{font-size:14px;font-weight:600;}
.msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:7px;}
.mrow{display:flex;align-items:flex-end;gap:6px;}
.mrow.mine{flex-direction:row-reverse;}
.bubble{max-width:72%;padding:9px 12px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word;}
.bubble.t{background:#f2f2f7;color:#1a1a2e;border-bottom-left-radius:4px;}
.bubble.m{background:#534AB7;color:#fff;border-bottom-right-radius:4px;}
.mt{font-size:10px;color:#bbb;margin-bottom:3px;}
.input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #eee;}
.input-row input{flex:1;font-size:13px;padding:9px 14px;border-radius:22px;border:1.5px solid #e0e0e0;outline:none;background:#fafafa;}
.input-row input:focus{border-color:#534AB7;background:#fff;}
.sbtn{width:36px;height:36px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:8px;font-size:13px;}
.dsep{text-align:center;font-size:11px;color:#bbb;padding:4px 0;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({ databaseURL:"https://notice-hanriver-default-rtdb.firebaseio.com/" });
const db = firebase.database();

const ACCOUNTS=[
  {id:'원장', pw:'ped1234',    c:'c0'},
  {id:'약국', pw:'pharma1234', c:'c1'},
  {id:'접수1',pw:'js10000',    c:'c2'},
  {id:'접수2',pw:'js20000',    c:'c3'},
  {id:'NAM', pw:'han1234',    c:'c4'},
];

let me=null, peer=null, selId=null;

// 채팅 구독 하나만 유지
let activeChatRef=null;

// 안읽음 카운트 (메모리)
// unread[uid] = count
let unread={};

function acct(id){return ACCOUNTS.find(a=>a.id===id);}
function mkey(a,b){return [a,b].sort().join('__');}
function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tstr(ts){return new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function dstr(ts){return new Date(ts).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});}
function lrKey(a,b){return 'lr_'+[a,b].sort().join('_');}
function getLR(a,b){return parseInt(localStorage.getItem(lrKey(a,b))||'0');}
function setLR(a,b){localStorage.setItem(lrKey(a,b),String(Date.now()));}

/* ── 로그인 ── */
function showLogin(err){
  // 채팅 구독 해제
  if(activeChatRef){activeChatRef.off();activeChatRef=null;}
  document.getElementById('root').innerHTML=`
  <div class="screen"><div class="login-card">
    <div style="font-size:32px;margin-bottom:12px;">💬</div>
    <div class="login-title">사랑소아청소년과 메신저</div>
    <div class="login-sub">소속을 선택하고 비밀번호를 입력하세요</div>
    <div class="user-btns">
      ${ACCOUNTS.map(a=>`<button class="user-btn${selId===a.id?' sel':''}" onclick="pickUser('${a.id}')">${a.id}</button>`).join('')}
    </div>
    <div class="pw-wrap">
      <input class="pw-input" id="pw" type="password" placeholder="비밀번호"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="err">${err||''}</div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div></div>`;
  if(selId) setTimeout(()=>document.getElementById('pw')?.focus(),50);
}

function pickUser(id){selId=id;showLogin();setTimeout(()=>document.getElementById('pw')?.focus(),50);}

function doLogin(){
  if(!selId){showLogin('소속을 선택해주세요.');return;}
  const pw=document.getElementById('pw')?.value||'';
  const a=acct(selId);
  if(!a||pw!==a.pw){showLogin('비밀번호가 맞지 않습니다.');return;}
  me=selId;localStorage.setItem('sarang_me',me);
  unread={};
  peer=null;
  startAllListeners();
}

function doLogout(){
  if(activeChatRef){activeChatRef.off();activeChatRef=null;}
  me=null;peer=null;unread={};
  localStorage.removeItem('sarang_me');
  showLogin();
}

/* ── 핵심: 전체 메시지 하나의 리스너로 관리 ── */
// 각 대화방 메시지를 메모리에 캐시
let msgCache={}; // mkey -> [{from,text,ts}]

function startAllListeners(){
  // 내가 참여하는 모든 대화방 구독 (읽음 추적용)
  const others=ACCOUNTS.filter(a=>a.id!==me);
  for(const u of others){
    const k=mkey(me,u.id);
    const lr=getLR(me,u.id);
    // 각 대화방의 새 메시지만 감지 (child_added)
    db.ref('msgs/'+k).orderByChild('ts').startAt(lr+1).on('child_added', snap=>{
      const m=snap.val();
      // 캐시에 추가
      if(!msgCache[k]) msgCache[k]=[];
      // 중복 방지
      if(!msgCache[k].find(x=>x.ts===m.ts&&x.from===m.from&&x.text===m.text)){
        msgCache[k].push(m);
        msgCache[k].sort((a,b)=>a.ts-b.ts);
      }
      // 안읽음 카운트
      if(m.from===u.id && peer!==u.id){
        unread[u.id]=(unread[u.id]||0)+1;
        updateBadge(u.id);
      }
      // 현재 열린 채팅방이면 렌더
      if(peer===u.id) renderMsgs();
    });
    // 기존 메시지 초기 로드
    db.ref('msgs/'+k).orderByChild('ts').once('value', snap=>{
      const arr=[];
      snap.forEach(ch=>arr.push(ch.val()));
      msgCache[k]=arr;
      // 안읽음 계산
      const myLR=getLR(me,u.id);
      unread[u.id]=arr.filter(m=>m.from===u.id&&m.ts>myLR).length;
      updateBadge(u.id);
      if(peer===u.id) renderMsgs();
    });
  }
  renderApp();
}

function updateBadge(uid){
  const el=document.getElementById('bdg_'+uid);
  if(!el) return;
  const c=unread[uid]||0;
  el.innerHTML=c>0?`<span class="badge">${c}</span>`:'';
}

/* ── 앱 화면 ── */
function renderApp(){
  const myA=acct(me);
  const others=ACCOUNTS.filter(a=>a.id!==me);
  const sideHtml=others.map(u=>`
    <div class="uitem${peer===u.id?' active':''}" onclick="selectPeer('${u.id}')">
      <div class="av ${u.c}">${u.id.slice(0,2)}</div>
      <div class="u-name">${u.id}</div>
      <span id="bdg_${u.id}">${(unread[u.id]||0)>0?`<span class="badge">${unread[u.id]}</span>`:''}</span>
    </div>`).join('');

  const chatHtml=peer?`
    <div class="chat-top">
      <div class="av ${acct(peer).c}">${peer.slice(0,2)}</div>
      <div class="chat-top-name">${peer}</div>
    </div>
    <div class="msgs" id="msglist"></div>
    <div class="input-row">
      <input id="minput" type="text" placeholder="메시지 입력..." autocomplete="off"
        onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="sbtn" onclick="sendMsg()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path d="M22 2L11 13M22 2L15 22 11 13 2 9 22 2Z"/>
        </svg>
      </button>
    </div>`
  :`<div class="empty">💬<span>왼쪽에서 대화 상대를 선택하세요</span></div>`;

  document.getElementById('root').innerHTML=`
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-top">
          <div class="me-row">
            <div class="av ${myA.c}">${me.slice(0,2)}</div>
            <div class="me-name">${me}</div>
            <button class="logout-btn" onclick="doLogout()">로그아웃</button>
          </div>
        </div>
        <div class="user-list">${sideHtml}</div>
      </div>
      <div class="chat-area">${chatHtml}</div>
    </div>`;

  if(peer){
    renderMsgs();
    setTimeout(()=>document.getElementById('minput')?.focus(),100);
  }
}

function renderMsgs(){
  const list=document.getElementById('msglist');
  if(!list) return;
  const k=mkey(me,peer);
  const msgs=msgCache[k]||[];
  const pA=acct(peer);
  let html='',lastD='';
  for(const m of msgs){
    const d=dstr(m.ts);
    if(d!==lastD){html+=`<div class="dsep">${d}</div>`;lastD=d;}
    const mine=m.from===me;
    html+=`<div class="mrow${mine?' mine':''}">
      ${!mine?`<div class="av sm ${pA.c}">${peer.slice(0,2)}</div>`:''}
      <div>
        <div class="mt" style="text-align:${mine?'right':'left'}">${tstr(m.ts)}</div>
        <div class="bubble ${mine?'m':'t'}">${esc(m.text)}</div>
      </div>
    </div>`;
  }
  if(!html) html=`<div class="empty">💬<span>${peer}과(와) 대화를 시작하세요</span></div>`;
  list.innerHTML=html;
  list.scrollTop=list.scrollHeight;
}

function selectPeer(uid){
  peer=uid;
  unread[uid]=0;
  setLR(me,uid);
  renderApp();
}

function sendMsg(){
  const inp=document.getElementById('minput');
  if(!inp||!peer) return;
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  db.ref('msgs/'+mkey(me,peer)).push({from:me,text,ts:Date.now()});
  inp.focus();
}

/* ── 초기화 ── */
const saved=localStorage.getItem('sarang_me');
if(saved&&acct(saved)){me=saved;unread={};startAllListeners();}
else showLogin();
</script>
</body>
</html>
