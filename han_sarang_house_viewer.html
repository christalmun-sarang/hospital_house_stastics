<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>병원 가계 통계 - 데이터 뷰어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; }

/* ── 헤더 & 탭 ── */
.header { background: #fff; border-bottom: 0.5px solid #ddddd5; padding: 14px 24px 0; }
.header-top { display: flex; align-items: center; margin-bottom: 10px; }
.header h1 { font-size: 18px; font-weight: 500; }
.header .subtitle { font-size: 12px; color: #888780; margin-top: 2px; }
.tabs { display: flex; gap: 0; border-bottom: none; }
.tab { padding: 9px 22px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none;
  color: #888780; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.tab:hover { color: #1a1a18; }
.tab.active { color: #1a1a18; border-bottom-color: #1a1a18; }

/* ── 서브탭 ── */
.subtabs { background: #fff; border-bottom: 0.5px solid #ddddd5; padding: 0 24px; display: flex; gap: 0; }
.subtab { padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none;
  color: #888780; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.subtab:hover { color: #1a1a18; }
.subtab.active { color: #185fa5; border-bottom-color: #185fa5; }

.status-bar { padding: 7px 24px; font-size: 13px; }
.status-bar.success { background: #eaf3de; color: #3b6d11; }
.status-bar.error   { background: #fcebeb; color: #a32d2d; }
.status-bar.loading { background: #e6f1fb; color: #185fa5; }

.page { display: none; }
.page.active { display: block; }

/* ── 컨트롤 바 ── */
.controls { background: #fff; border-bottom: 0.5px solid #ddddd5; padding: 10px 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.ctrl-label { font-size: 13px; color: #888780; }
.controls select, .controls input[type=date] {
  border: 0.5px solid #b4b2a9; border-radius: 8px; padding: 7px 12px;
  font-size: 13px; background: #fff; color: #1a1a18; width: auto;
}
.controls select:focus, .controls input:focus { outline: 2px solid #185fa5; outline-offset: 1px; }
.controls .tilde { color: #888780; font-size: 13px; }
button { border: 0.5px solid #1a1a18; border-radius: 8px; padding: 8px 18px; font-size: 13px; background: #1a1a18; color: #fff; font-weight: 500; cursor: pointer; }
button:hover { background: #333; }
button.secondary { background: #fff; color: #1a1a18; border-color: #b4b2a9; }
button.secondary:hover { background: #f5f5f0; }
.sort-hint { font-size: 12px; color: #b4b2a9; margin-left: auto; }

.main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

/* ── 통계 ── */
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: #f1efe8; border-radius: 8px; padding: 14px 16px; }
.metric-card .mlabel { font-size: 12px; color: #888780; margin-bottom: 4px; }
.metric-card .mvalue { font-size: 22px; font-weight: 500; }
.metric-card .msub { font-size: 12px; color: #888780; margin-top: 2px; }
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 700px) { .chart-grid { grid-template-columns: 1fr; } }
.chart-card { background: #fff; border: 0.5px solid #ddddd5; border-radius: 12px; padding: 16px 18px; }
.chart-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: #444441; }
.chart-card.wide { grid-column: 1 / -1; }
.chart-card canvas { max-height: 320px; }
.table-card { background: #fff; border: 0.5px solid #ddddd5; border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
.table-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: #444441; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: right; color: #888780; font-weight: 500; padding: 7px 8px; border-bottom: 0.5px solid #ddddd5;
  cursor: pointer; user-select: none; white-space: nowrap; }
th:first-child { text-align: right; }
th .arrow { font-size: 10px; margin-left: 3px; color: #185fa5; }
td { padding: 8px 8px; border-bottom: 0.5px solid #f1efe8; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
td:first-child { text-align: right; font-variant-numeric: initial; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f5f5f0; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.badge-sun { background: #fcebeb; color: #a32d2d; }
.table-scroll { overflow-x: auto; }

#loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
#loading-overlay.visible { display: flex; }
.spinner { width: 32px; height: 32px; border: 3px solid #ddddd5; border-top-color: #1a1a18; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-msg { text-align: center; color: #888780; padding: 30px; font-size: 13px; }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div style="font-size:13px;color:#888780;">불러오는 중...</div></div>

<div class="header">
  <div class="header-top">
    <h1>🏥 병원 가계 통계</h1>
  </div>
  <div class="subtitle" style="margin-bottom:10px;">daily_han · Supabase</div>
  <div class="tabs">
    <button class="tab" id="tab-gen">데이터 생성</button>
    <button class="tab active" id="tab-viewer">데이터 뷰어</button>
  </div>
</div>
<div class="status-bar success" id="status-bar">✓ 연결됨</div>

<div class="subtabs">
  <button class="subtab active" id="sub-hangang" onclick="selectSub('hangang')">한강일일데이터</button>
</div>

<div class="page active" id="page-hangang">
  <div class="controls">
    <span class="ctrl-label">기간:</span>
    <select id="period-mode" onchange="onPeriodModeChange()">
      <option value="year">연도별</option>
      <option value="month">월별</option>
      <option value="day">일별 날짜검색</option>
    </select>

    <span id="ctrl-year-range" style="display:none;">
      <select id="year-from"></select>
      <span class="tilde">~</span>
      <select id="year-to"></select>
    </span>

    <span id="ctrl-month-year" style="display:none;">
      <select id="month-year"></select>
    </span>

    <span id="ctrl-day-range" style="display:none;">
      <input type="date" id="day-from">
      <span class="tilde">~</span>
      <input type="date" id="day-to">
    </span>

    <button onclick="runQuery()">조회</button>
    <button class="secondary" onclick="refreshData()">↻ 새로고침</button>
    <span class="sort-hint">← 항목 클릭으로 정렬</span>
  </div>

  <div class="main">
    <div class="metric-grid">
      <div class="metric-card">
        <div class="mlabel">총 매출</div>
        <div class="mvalue" id="m-revenue">-</div>
        <div class="msub" id="m-revenue-sub"></div>
      </div>
      <div class="metric-card">
        <div class="mlabel">총 환자수</div>
        <div class="mvalue" id="m-patients">-</div>
        <div class="msub" id="m-patients-sub"></div>
      </div>
      <div class="metric-card">
        <div class="mlabel">일평균 매출</div>
        <div class="mvalue" id="m-avg-revenue">-</div>
      </div>
      <div class="metric-card">
        <div class="mlabel">일평균 환자수</div>
        <div class="mvalue" id="m-avg-patients">-</div>
      </div>
      <div class="metric-card">
        <div class="mlabel">초진 환자</div>
        <div class="mvalue" id="m-new">-</div>
      </div>
      <div class="metric-card">
        <div class="mlabel">청구액 합계</div>
        <div class="mvalue" id="m-claim">-</div>
      </div>
    </div>

    <div class="chart-card wide">
      <h3 id="chart-title-revenue">매출</h3>
      <canvas id="chart-revenue"></canvas>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <h3 id="chart-title-patients">환자수</h3>
        <canvas id="chart-patients"></canvas>
      </div>
      <div class="chart-card">
        <h3 id="chart-title-new">초진환자수</h3>
        <canvas id="chart-new"></canvas>
      </div>
    </div>

    <div class="table-card">
      <h3 id="table-title">상세</h3>
      <div class="table-scroll">
        <table id="detail-table">
          <thead><tr id="detail-thead"></tr></thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://algfzvbqxxvcaunlsrxd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsZ2Z6dmJxeHh2Y2F1bmxzcnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MDM5MDQsImV4cCI6MjA5NDQ3OTkwNH0.lD9pIFoSw2lYY23zDMFbfeGvI0p_kcih61rScSh5a3s';
const HDR = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
const DOW = ['일','월','화','수','목','금','토'];

let currentMode = 'year';
let currentRows = []; // raw daily_han rows fetched for current query
let detailRows = [];  // aggregated rows currently shown in detail table
let detailCols = [];  // column definitions for current mode
let sortState = { key: null, dir: 1 };
let chartRevenue=null, chartPatients=null, chartNew=null;

function loading(v){ document.getElementById('loading-overlay').classList.toggle('visible', !!v); }
function setStatus(msg, type){
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar ' + (type||'success');
}

/* ── 연/월 셀렉트 초기화 ── */
function initSelectors(){
  const thisYear = new Date().getFullYear();
  const startYear = 2013;
  const yf = document.getElementById('year-from');
  const yt = document.getElementById('year-to');
  const my = document.getElementById('month-year');
  yf.innerHTML=''; yt.innerHTML=''; my.innerHTML='';
  for(let y=thisYear; y>=startYear; y--){
    yf.innerHTML += `<option value="${y}">${y}</option>`;
    yt.innerHTML += `<option value="${y}">${y}</option>`;
    my.innerHTML += `<option value="${y}">${y}</option>`;
  }
  yf.value = thisYear;
  yt.value = thisYear;
  my.value = thisYear;

  const today = new Date();
  const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth()-1);
  document.getElementById('day-to').value = fmtDate(today);
  document.getElementById('day-from').value = fmtDate(monthAgo);
}
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function onPeriodModeChange(){
  currentMode = document.getElementById('period-mode').value;
  document.getElementById('ctrl-year-range').style.display = currentMode==='year' ? 'inline-flex' : 'none';
  document.getElementById('ctrl-month-year').style.display = currentMode==='month' ? 'inline-flex' : 'none';
  document.getElementById('ctrl-day-range').style.display = currentMode==='day' ? 'inline-flex' : 'none';
}

/* ── 숫자 포맷 ── */
function won(n){ return n==null ? '-' : Math.round(n).toLocaleString(); }
function bigWon(n){
  if(n==null) return '-';
  const abs=Math.abs(n);
  if(abs>=100000000) return (n/100000000).toFixed(1)+'억';
  if(abs>=10000) return Math.round(n/10000).toLocaleString()+'만';
  return Math.round(n).toLocaleString();
}
function manTick(v){ return (v/10000).toLocaleString()+'만'; }

/* ── 데이터 조회 ── */
async function fetchRange(fromDate, toDate){
  const url = `${SUPABASE_URL}/rest/v1/daily_han?select=*&date=gte.${fromDate}&date=lte.${toDate}&order=date.asc`;
  const res = await fetch(url, { headers: HDR });
  if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.message || `HTTP ${res.status}`); }
  return await res.json();
}

let prevYearRows = [];
async function runQuery(){
  loading(true);
  try{
    let fromDate, toDate;
    prevYearRows = [];
    if(currentMode==='year'){
      const yf = +document.getElementById('year-from').value;
      const yt = +document.getElementById('year-to').value;
      const lo = Math.min(yf,yt), hi = Math.max(yf,yt);
      fromDate = `${lo}-01-01`; toDate = `${hi}-12-31`;
    } else if(currentMode==='month'){
      const y = +document.getElementById('month-year').value;
      fromDate = `${y}-01-01`; toDate = `${y}-12-31`;
    } else {
      fromDate = document.getElementById('day-from').value;
      toDate = document.getElementById('day-to').value;
      if(!fromDate || !toDate){ setStatus('⚠ 날짜를 선택하세요','error'); loading(false); return; }
    }
    currentRows = await fetchRange(fromDate, toDate);
    if(currentMode==='month'){
      const y = +document.getElementById('month-year').value;
      try{ prevYearRows = await fetchRange(`${y-1}-01-01`, `${y-1}-12-31`); }catch(e){ prevYearRows = []; }
    }
    renderAll();
    setStatus('✓ 연결됨','success');
  }catch(e){
    setStatus('⚠ 조회 실패: '+e.message,'error');
  }finally{
    loading(false);
  }
}
function refreshData(){ runQuery(); }

/* ── 집계 ── */
function aggregateByKey(rows, keyFn, labelFn){
  const map = new Map();
  rows.forEach(r=>{
    const k = keyFn(r);
    if(!map.has(k)){
      map.set(k, {key:k, label:labelFn(r,k), revenue:0, patients:0, newp:0, cash:0, card:0, claim:0, days:0});
    }
    const g = map.get(k);
    g.revenue += r.daily_revenue||0;
    g.patients += r.total_patients||0;
    g.newp += r.new_patients||0;
    g.cash += r.cash||0;
    g.card += r.card||0;
    g.claim += r.insurance_claim||0;
    g.days += 1;
  });
  return Array.from(map.values()).sort((a,b)=>a.key.localeCompare(b.key));
}

function renderAll(){
  if(currentMode==='year'){
    renderYearMode();
  } else if(currentMode==='month'){
    renderMonthMode();
  } else {
    renderDayMode();
  }
}

function computeSummary(rows){
  let revenue=0, patients=0, newp=0, claim=0, days=0;
  rows.forEach(r=>{
    revenue += r.daily_revenue||0;
    patients += r.total_patients||0;
    newp += r.new_patients||0;
    claim += r.insurance_claim||0;
    if((r.total_patients||0)>0 || r.daily_revenue) days += 1;
  });
  const avgRevenue = days? revenue/days : 0;
  const avgPatients = days? patients/days : 0;
  return {revenue, patients, newp, claim, days, avgRevenue, avgPatients};
}

function setSummary(s){
  document.getElementById('m-revenue').textContent = bigWon(s.revenue);
  document.getElementById('m-revenue-sub').textContent = won(s.revenue)+'원';
  document.getElementById('m-patients').textContent = s.patients.toLocaleString()+'명';
  document.getElementById('m-patients-sub').textContent = '진료일 '+s.days+'일';
  document.getElementById('m-avg-revenue').textContent = bigWon(s.avgRevenue);
  document.getElementById('m-avg-patients').textContent = Math.round(s.avgPatients)+'명';
  document.getElementById('m-new').textContent = s.newp.toLocaleString()+'명';
  document.getElementById('m-claim').textContent = bigWon(s.claim);
}

function renderYearMode(){
  const groups = aggregateByKey(currentRows, r=>r.date.slice(0,4), (r,k)=>k);
  setSummary(computeSummary(currentRows));
  const yf = document.getElementById('year-from').value, yt = document.getElementById('year-to').value;
  document.getElementById('chart-title-revenue').textContent = `${yf}~${yt} 연도별 매출`;
  document.getElementById('chart-title-patients').textContent = `${yf}~${yt} 연도별 환자수`;
  document.getElementById('chart-title-new').textContent = `${yf}~${yt} 연도별 초진환자수`;
  document.getElementById('table-title').textContent = '연도별 상세';

  drawCharts(groups.map(g=>g.key), groups.map(g=>g.revenue), groups.map(g=>g.patients), groups.map(g=>g.newp));

  detailCols = [
    {key:'key', label:'연도', type:'text'},
    {key:'revenue', label:'매출', type:'num'},
    {key:'patients', label:'환자수', type:'num'},
    {key:'newp', label:'초진', type:'num'},
    {key:'avgRevenue', label:'일평균매출', type:'num'},
    {key:'avgPatients', label:'일평균환자', type:'num'},
    {key:'days', label:'진료일', type:'num'},
  ];
  detailRows = groups.map(g=>({...g, avgRevenue: g.days? g.revenue/g.days : 0, avgPatients: g.days? g.patients/g.days : 0}));
  sortState = {key:null, dir:1};
  renderDetailTable();
}

function pct(curr, prev){
  if(prev==null || prev===0) return null;
  return ((curr-prev)/prev)*100;
}

function renderMonthMode(){
  const y = document.getElementById('month-year').value;
  const groupsRaw = aggregateByKey(currentRows, r=>r.date.slice(0,7), (r,k)=>k);
  const byMonth = new Map(groupsRaw.map(g=>[g.key.slice(5,7), g]));
  const prevGroupsRaw = aggregateByKey(prevYearRows, r=>r.date.slice(0,7), (r,k)=>k);
  const prevByMonth = new Map(prevGroupsRaw.map(g=>[g.key.slice(5,7), g]));
  const hasPrev = prevYearRows.length > 0;

  // 항상 01~12월 표시 (데이터 없는 달은 0)
  const groups = [];
  for(let m=1; m<=12; m++){
    const mm = String(m).padStart(2,'0');
    const g = byMonth.get(mm) || {key:`${y}-${mm}`, revenue:0, patients:0, newp:0, cash:0, card:0, claim:0, days:0};
    const pg = prevByMonth.get(mm);
    groups.push({
      ...g,
      key: `${y}-${mm}`,
      prevRevenue: pg ? pg.revenue : null,
      prevPatients: pg ? pg.patients : null,
      revenuePct: pg ? pct(g.revenue, pg.revenue) : null,
      patientsPct: pg ? pct(g.patients, pg.patients) : null,
    });
  }

  setSummary(computeSummary(currentRows));
  document.getElementById('chart-title-revenue').textContent = `${y}년 월별 매출` + (hasPrev ? ` (전년 비교)` : '');
  document.getElementById('chart-title-patients').textContent = `${y}년 월별 환자수` + (hasPrev ? ` (전년 비교)` : '');
  document.getElementById('chart-title-new').textContent = `${y}년 월별 초진환자수`;
  document.getElementById('table-title').textContent = '월별 상세' + (hasPrev ? ` (전년 ${y-1} 비교)` : '');

  const labels = groups.map(g=>g.key.slice(5)+'월');
  drawCharts(
    labels, groups.map(g=>g.revenue), groups.map(g=>g.patients), groups.map(g=>g.newp),
    hasPrev ? groups.map(g=>g.prevRevenue) : null,
    hasPrev ? groups.map(g=>g.prevPatients) : null
  );

  detailCols = [
    {key:'key', label:'월', type:'text'},
    {key:'revenue', label:'매출', type:'num'},
    {key:'patients', label:'환자수', type:'num'},
    {key:'newp', label:'초진', type:'num'},
    {key:'cash', label:'현금', type:'num'},
    {key:'card', label:'카드', type:'num'},
    {key:'claim', label:'청구액', type:'num'},
    {key:'days', label:'진료일', type:'num'},
  ];
  if(hasPrev){
    detailCols.push(
      {key:'prevRevenue', label:'전년매출', type:'num'},
      {key:'revenuePct', label:'매출증감(%)', type:'pct'},
      {key:'prevPatients', label:'전년환자', type:'num'},
      {key:'patientsPct', label:'환자증감(%)', type:'pct'},
    );
  }
  detailRows = groups;
  sortState = {key:null, dir:1};
  renderDetailTable();
}

function renderDayMode(){
  setSummary(computeSummary(currentRows));
  const fromDate = document.getElementById('day-from').value, toDate = document.getElementById('day-to').value;
  document.getElementById('chart-title-revenue').textContent = `${fromDate}~${toDate} 일별 매출`;
  document.getElementById('chart-title-patients').textContent = `${fromDate}~${toDate} 일별 환자수`;
  document.getElementById('chart-title-new').textContent = `${fromDate}~${toDate} 일별 초진환자수`;
  document.getElementById('table-title').textContent = `일별 상세 (${currentRows.length}건)`;

  drawCharts(currentRows.map(r=>r.date.slice(5)), currentRows.map(r=>r.daily_revenue||0), currentRows.map(r=>r.total_patients||0), currentRows.map(r=>r.new_patients||0));

  detailCols = [
    {key:'date', label:'날짜', type:'text'},
    {key:'day_of_week', label:'요일', type:'dow'},
    {key:'daily_revenue', label:'매출', type:'num'},
    {key:'total_patients', label:'환자', type:'num'},
    {key:'new_patients', label:'초진', type:'num'},
    {key:'cash', label:'현금', type:'num'},
    {key:'card', label:'카드', type:'num'},
    {key:'insurance_claim', label:'청구액', type:'num'},
    {key:'deposit', label:'입금', type:'num'},
  ];
  detailRows = currentRows.slice().sort((a,b)=>b.date.localeCompare(a.date));
  sortState = {key:null, dir:1};
  renderDetailTable();
}

/* ── 차트 ── */
function drawCharts(labels, revenue, patients, newp, prevRevenue, prevPatients){
  if(chartRevenue) chartRevenue.destroy();
  if(chartPatients) chartPatients.destroy();
  if(chartNew) chartNew.destroy();

  const revDatasets = [{ label:'매출', data: revenue, backgroundColor:'#1f5fa8', borderRadius:3, order:2 }];
  if(prevRevenue){
    revDatasets.push({ label:'전년 매출', data: prevRevenue, type:'line', borderColor:'#c94f4f', backgroundColor:'#c94f4f', borderDash:[5,4], pointRadius:2, tension:.25, fill:false, order:1 });
  }
  chartRevenue = new Chart(document.getElementById('chart-revenue'), {
    type:'bar',
    data:{ labels, datasets: revDatasets },
    options:{ plugins:{legend:{display: !!prevRevenue}}, scales:{ y:{ ticks:{ callback:manTick } } } }
  });

  const patDatasets = [{ label:'환자수', data: patients, borderColor:'#3b6d11', backgroundColor:'rgba(59,109,17,0.08)', fill:true, tension:.3, pointRadius:3 }];
  if(prevPatients){
    patDatasets.push({ label:'전년 환자수', data: prevPatients, borderColor:'#c94f4f', backgroundColor:'rgba(201,79,79,0.08)', borderDash:[5,4], fill:false, tension:.3, pointRadius:2 });
  }
  chartPatients = new Chart(document.getElementById('chart-patients'), {
    type:'line',
    data:{ labels, datasets: patDatasets },
    options:{ plugins:{legend:{display: !!prevPatients}} }
  });

  chartNew = new Chart(document.getElementById('chart-new'), {
    type:'bar',
    data:{ labels, datasets:[{ data: newp, backgroundColor:'#c9852f', borderRadius:3 }] },
    options:{ plugins:{legend:{display:false}} }
  });
}

/* ── 상세 테이블 (정렬 가능) ── */
function renderDetailTable(){
  const thead = document.getElementById('detail-thead');
  thead.innerHTML = detailCols.map(c=>{
    let arrow='';
    if(sortState.key===c.key) arrow = `<span class="arrow">${sortState.dir===1?'▲':'▼'}</span>`;
    return `<th onclick="sortDetail('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');

  const tbody = document.getElementById('detail-tbody');
  if(!detailRows.length){
    tbody.innerHTML = `<tr><td colspan="${detailCols.length}" class="empty-msg">데이터 없음</td></tr>`;
    return;
  }
  tbody.innerHTML = detailRows.map(r=>{
    return '<tr>' + detailCols.map(c=>{
      const v = r[c.key];
      if(c.type==='num') return `<td>${v!=null?won(v):'-'}</td>`;
      if(c.type==='dow') return `<td>${v==='일'?'<span class="badge badge-sun">일</span>':(v||'-')}</td>`;
      if(c.type==='pct'){
        if(v==null) return `<td style="color:#b4b2a9;">-</td>`;
        const up = v>=0;
        const color = up ? '#3b6d11' : '#a32d2d';
        const arrow = up ? '▲' : '▼';
        return `<td style="color:${color};font-weight:500;">${arrow} ${Math.abs(v).toFixed(1)}%</td>`;
      }
      return `<td>${v!=null?v:'-'}</td>`;
    }).join('') + '</tr>';
  }).join('');
}

function sortDetail(key){
  if(sortState.key===key){ sortState.dir *= -1; } else { sortState = {key, dir:1}; }
  detailRows.sort((a,b)=>{
    const va=a[key], vb=b[key];
    if(va==null && vb==null) return 0;
    if(va==null) return 1;
    if(vb==null) return -1;
    if(typeof va==='number' && typeof vb==='number') return (va-vb)*sortState.dir;
    return String(va).localeCompare(String(vb))*sortState.dir;
  });
  renderDetailTable();
}

function selectSub(name){
  document.querySelectorAll('.subtab').forEach(el=>el.classList.remove('active'));
  document.getElementById('sub-'+name).classList.add('active');
}

document.getElementById('tab-gen').addEventListener('click', function(){
  // placeholder link back to data_generation page when embedded together
  setStatus('데이터 생성 화면으로 이동하려면 data_generation.html 을 사용하세요.', 'loading');
});

/* ── 초기화 ── */
(function init(){
  initSelectors();
  onPeriodModeChange();
  runQuery();
})();
</script>
